name: TPCH_REVENUE_ANALYSIS
description: >
  Revenue analysis semantic view built on TPC-H sample data.
  Provides metrics for order values, line item counts, and customer counts
  with dimensions for time, customer, and order attributes.
tables:
  - name: CUSTOMERS
    description: Main table for customer data
    base_table:
      database: SNOWFLAKE_SAMPLE_DATA
      schema: TPCH_SF1
      table: CUSTOMER
    primary_key:
      columns:
        - C_CUSTKEY
    dimensions:
      - name: CUSTOMER_NAME
        synonyms:
          - customer name
          - buyer name
        description: Name of the customer
        expr: C_NAME
        data_type: VARCHAR(25)
      - name: CUSTOMER_MARKET_SEGMENT
        synonyms:
          - market segment
          - segment
        description: Market segment the customer belongs to
        expr: C_MKTSEGMENT
        data_type: VARCHAR(10)
      - name: C_CUSTKEY
        expr: C_CUSTKEY
        data_type: VARCHAR(134217728)
    metrics:
      - name: CUSTOMER_COUNT
        description: Total number of distinct customers
        expr: COUNT(DISTINCT C_CUSTKEY)

  - name: ORDERS
    synonyms:
      - sales orders
    description: All orders placed by customers
    base_table:
      database: SNOWFLAKE_SAMPLE_DATA
      schema: TPCH_SF1
      table: ORDERS
    primary_key:
      columns:
        - O_ORDERKEY
    dimensions:
      - name: ORDER_DATE
        description: Date when the order was placed
        expr: O_ORDERDATE
        data_type: DATE
      - name: ORDER_YEAR
        synonyms:
          - year
        description: Year when the order was placed
        expr: YEAR(O_ORDERDATE)
        data_type: "NUMBER(4,0)"
      - name: ORDER_STATUS
        description: Current status of the order (F=fulfilled, O=open, P=pending)
        expr: O_ORDERSTATUS
        data_type: VARCHAR(1)
      - name: O_ORDERKEY
        expr: O_ORDERKEY
        data_type: VARCHAR(134217728)
      - name: O_CUSTKEY
        expr: O_CUSTKEY
        data_type: VARCHAR(134217728)
    facts:
      - name: COUNT_LINE_ITEMS
        description: Number of line items in the order
        expr: COUNT(LINE_ITEMS.LINE_ITEM_ID)
        data_type: "NUMBER(18,0)"
    metrics:
      - name: ORDER_AVERAGE_VALUE
        description: Average order value across all orders
        expr: AVG(ORDERS.O_TOTALPRICE)
      - name: AVERAGE_LINE_ITEMS_PER_ORDER
        description: Average number of line items per order
        expr: AVG(ORDERS.COUNT_LINE_ITEMS)
      - name: TOTAL_REVENUE
        description: Sum of all order values
        expr: SUM(O_TOTALPRICE)

  - name: LINE_ITEMS
    description: Individual line items within orders
    base_table:
      database: SNOWFLAKE_SAMPLE_DATA
      schema: TPCH_SF1
      table: LINEITEM
    primary_key:
      columns:
        - L_ORDERKEY
        - L_LINENUMBER
    dimensions:
      - name: L_ORDERKEY
        expr: L_ORDERKEY
        data_type: VARCHAR(134217728)
      - name: L_LINENUMBER
        expr: L_LINENUMBER
        data_type: VARCHAR(134217728)
    facts:
      - name: LINE_ITEM_ID
        description: Unique identifier for a line item
        expr: "CONCAT(L_ORDERKEY, '-', L_LINENUMBER)"
        data_type: VARCHAR(134217728)
      - name: DISCOUNTED_PRICE
        description: Extended price after applying the discount
        expr: L_EXTENDEDPRICE * (1 - L_DISCOUNT)
        data_type: "NUMBER(25,4)"
    metrics:
      - name: TOTAL_DISCOUNTED_REVENUE
        description: Total revenue after all line-item discounts applied
        expr: SUM(LINE_ITEMS.DISCOUNTED_PRICE)
      - name: AVERAGE_DISCOUNT_SAVINGS
        description: Average discount savings per line item
        expr: AVG(L_EXTENDEDPRICE * L_DISCOUNT)

relationships:
  - name: ORDERS_TO_CUSTOMERS
    left_table: ORDERS
    right_table: CUSTOMERS
    relationship_columns:
      - left_column: O_CUSTKEY
        right_column: C_CUSTKEY
    relationship_type: many_to_one
  - name: LINE_ITEMS_TO_ORDERS
    left_table: LINE_ITEMS
    right_table: ORDERS
    relationship_columns:
      - left_column: L_ORDERKEY
        right_column: O_ORDERKEY
    relationship_type: many_to_one

verified_queries:
  - name: "total_revenue_by_year"
    question: "What is the total revenue by year?"
    verified_at: 1750000000
    verified_by: "jordan.hill@snowflake.com"
    use_as_onboarding_question: true
    sql: |
      SELECT order_year, SUM(o_totalprice) AS total_revenue
      FROM __orders
      GROUP BY order_year
      ORDER BY order_year

  - name: "customers_by_segment"
    question: "How many customers are in each market segment?"
    verified_at: 1750000000
    verified_by: "jordan.hill@snowflake.com"
    use_as_onboarding_question: true
    sql: |
      SELECT customer_market_segment, COUNT(DISTINCT c_custkey) AS customer_count
      FROM __customers
      GROUP BY customer_market_segment
      ORDER BY customer_count DESC

  - name: "avg_order_value_1995"
    question: "What is the average order value for 1995?"
    verified_at: 1750000000
    verified_by: "jordan.hill@snowflake.com"
    sql: |
      SELECT AVG(o_totalprice) AS avg_order_value
      FROM __orders
      WHERE order_year = 1995

  - name: "avg_line_items_per_order"
    question: "What is the average number of line items per order?"
    verified_at: 1750000000
    verified_by: "jordan.hill@snowflake.com"
    use_as_onboarding_question: true
    sql: |
      SELECT AVG(count_line_items) AS avg_line_items
      FROM __orders

  - name: "discounted_revenue_by_year"
    question: "What is the total discounted revenue by year?"
    verified_at: 1750000000
    verified_by: "jordan.hill@snowflake.com"
    sql: |
      SELECT order_year, SUM(discounted_price) AS total_discounted_revenue
      FROM __line_items
      JOIN __orders ON __line_items.l_orderkey = __orders.o_orderkey
      GROUP BY order_year
      ORDER BY order_year

  - name: "revenue_fulfilled_orders"
    question: "What is the total revenue for fulfilled orders?"
    verified_at: 1750000000
    verified_by: "jordan.hill@snowflake.com"
    sql: |
      SELECT SUM(o_totalprice) AS total_revenue
      FROM __orders
      WHERE order_status = 'F'

  - name: "top_5_customers_by_orders"
    question: "Who are the top 5 customers by number of orders?"
    verified_at: 1750000000
    verified_by: "jordan.hill@snowflake.com"
    sql: |
      SELECT customer_name, COUNT(DISTINCT o_orderkey) AS order_count
      FROM __orders
      JOIN __customers ON __orders.o_custkey = __customers.c_custkey
      GROUP BY customer_name
      ORDER BY order_count DESC
      LIMIT 5

  - name: "avg_discount_savings"
    question: "What is the average discount savings per line item?"
    verified_at: 1750000000
    verified_by: "jordan.hill@snowflake.com"
    sql: |
      SELECT AVG(l_extendedprice * l_discount) AS avg_discount_savings
      FROM __line_items

  - name: "orders_by_status"
    question: "How many orders are there by status?"
    verified_at: 1750000000
    verified_by: "jordan.hill@snowflake.com"
    sql: |
      SELECT order_status, COUNT(DISTINCT o_orderkey) AS order_count
      FROM __orders
      GROUP BY order_status
      ORDER BY order_count DESC

  - name: "revenue_by_segment"
    question: "What is the total revenue by customer market segment?"
    verified_at: 1750000000
    verified_by: "jordan.hill@snowflake.com"
    sql: |
      SELECT customer_market_segment, SUM(o_totalprice) AS total_revenue
      FROM __orders
      JOIN __customers ON __orders.o_custkey = __customers.c_custkey
      GROUP BY customer_market_segment
      ORDER BY total_revenue DESC
