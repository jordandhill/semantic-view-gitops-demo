name: Validate Semantic Views

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "semantic_views/**"
      - "scripts/**"

permissions:
  id-token: write
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Snowflake CLI + OIDC Auth
        uses: snowflakedb/snowflake-actions@v3
        with:
          use-oidc: true
          cli-version: "3.16"
          default-config-file-path: config.toml

      - name: Validate Semantic View YAML (dry run)
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_TARGET_SCHEMA: "SANDBOX.PUBLIC"
        run: ./scripts/deploy.sh --dry-run
