name: Deploy Semantic Views

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "semantic_views/**"
      - "scripts/**"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Snowflake CLI + OIDC Auth
        uses: snowflakedb/snowflake-actions@v3
        with:
          use-oidc: true
          cli-version: "3.16"
          default-config-file-path: config.toml

      - name: Deploy Semantic Views to Snowflake
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_WAREHOUSE: COMPUTE_G2_S
          SNOWFLAKE_DATABASE: SANDBOX
          SNOWFLAKE_SCHEMA: PUBLIC
          SNOWFLAKE_TARGET_SCHEMA: "SANDBOX.PUBLIC"
        run: ./scripts/deploy.sh
